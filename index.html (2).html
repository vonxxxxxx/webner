<!DOCTYPE html>
<html>
<head>
<title>Tripple_T Browser</title>

<style>
body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
}

.topbar{
background:#2b2b2b;
padding:10px;
display:flex;
align-items:center;
}

.tabs{
display:flex;
gap:10px;
margin-right:15px;
}

.tab{
background:#3a3a3a;
padding:6px 12px;
border-radius:6px;
}

.address{
flex:1;
}

.address input{
width:100%;
padding:8px;
border-radius:6px;
border:none;
}

.bookmarks{
padding:15px;
}

.bookmarks a{
display:inline-block;
margin:8px;
padding:10px 14px;
background:#333;
color:white;
text-decoration:none;
border-radius:6px;
}

iframe{
width:100%;
height:80vh;
border:none;
}
</style>

</head>

<body>

<div class="topbar">

<div class="tabs">
<div class="tab">New Tab</div>
</div>

<div class="address">
<input id="url" placeholder="Enter website or search">
</div>

<button onclick="go()">Go</button>

</div>

<div class="bookmarks">

<a href="https://youtube.com">YouTube</a>
<a href="https://google.com">Google</a>
<a href="https://github.com">GitHub</a>
<a href="https://reddit.com">Reddit</a>

</div>

<iframe id="viewer"></iframe>

<script>

function go(){
let url = document.getElementById("url").value;

if(!url.startsWith("http")){
url = "https://www.google.com/search?q=" + url;
}

document.getElementById("viewer").src = url;

}

</script>

</body>
</html>
